bundle:
  name: weather-analytics

targets:
  dev:
    default: true
    workspace:
      host: https://adb-7405613702166058.18.azuredatabricks.net

resources:
  jobs:
    weather_medallion_pipeline:
      name: weather_medallion_pipeline
      run_as:
        user_name: dbadmin@jaredmorris25gmail.onmicrosoft.com
      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: 16.4.x-scala2.12
            node_type_id: Standard_D4s_v3
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode
            autotermination_minutes: 30
      tasks:
        - task_key: staging
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_staging.py

        - task_key: bronze
          depends_on:
            - task_key: staging
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_bronze.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_silver.py

        - task_key: gold
          depends_on:
            - task_key: silver
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_gold.py

        - task_key: bi
          depends_on:
            - task_key: gold
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_bi.py

        - task_key: rpt
          depends_on:
            - task_key: gold
          job_cluster_key: pipeline_cluster
          spark_python_task:
            python_file: src/transform_rpt.py